<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Life Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f8;
      color: #1a1d27;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: .9rem; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #574fd6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Life Planner needs a connection for the first load. Once loaded, most features work offline.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
